default:
  app:
    enabled: true
    enableAutoSync: true
    autoSyncPrune: false
    project: cluster-config
    labels:
      app-source: base
      repo: sakaar-ops
    destination:
      namespace: openshift-gitops
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/PixelJonas/sakaar-ops.git
      targetRevision: HEAD

projects:
  cluster-config:
    description: Project for overall cluster configuration
    namespace: openshift-gitops
    sourceRepos:
      - https://github.com/PixelJonas/sakaar-ops
    destinations: |
      - namespace: '*'
        server: https://kubernetes.default.svc
    extraFields: |
      clusterResourceWhitelist:
      - group: '*'
        kind: '*'

applications:
  external-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "1"
    destination:
      namespace: external-secrets-operator
    source:
      path: components-infra/external-secrets-operator/base
