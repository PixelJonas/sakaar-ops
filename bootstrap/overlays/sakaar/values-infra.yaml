default:
  app:
    enabled: true
    enableAutoSync: true
    autoSyncPrune: true
    project: cluster-config
    labels:
      app-source: sakaar
      repo: sakaar-ops
    destination:
      namespace: openshift-gitops
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/PixelJonas/sakaar-ops.git
      targetRevision: HEAD

applications:
  external-secrets-doppler:
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    destination:
      namespace: external-secrets-operator
    source:
      path: components-infra/external-secrets-store-doppler/base

  cert-manager-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    destination:
      namespace: cert-manager-operator
    source:
      path: components-infra/cert-manager-operator/aggregate/overlays/letsencrypt

  actions-runner-controller:
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    destination:
      namespace: actions-runner-system
    source:
      path: components-infra/actions-runner-controller/base

  gha-runner-scale-set-palbuddy:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: arc-runners-palbuddy
    source:
      path: components-infra/gha-runner-scale-set-palbuddy/base

  gha-runner-scale-set-tax-agent:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: arc-runners-tax-agent
    source:
      path: components-infra/gha-runner-scale-set-tax-agent/base

  certificates:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: cert-manager-operator
    source:
      path: components-infra/certificates/base

  openshift-oauth-htpasswd:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: openshift-config
    source:
      path: components-infra/openshift-oauth-htpasswd/base

  claude-admin:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: claude-admin
    source:
      path: components-infra/claude-admin/base
