apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-runner-set-devland-github-secret
  namespace: arc-runners-devland
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: arc-runner-set-devland-github-secret
  data:
    - secretKey: github_app_id
      remoteRef:
        key: PALBUDDY_GHA_APP_ID
    - secretKey: github_app_installation_id
      remoteRef:
        key: PALBUDDY_GHA_INSTALLATION_ID
    - secretKey: github_app_private_key
      remoteRef:
        key: PALBUDDY_GHA_PRIVATE_KEY
