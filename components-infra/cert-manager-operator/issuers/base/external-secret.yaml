apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-cloudflare-api-token
  namespace: cert-manager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: CF_API_TOKEN
