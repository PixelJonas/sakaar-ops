apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-doppler-egress
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
